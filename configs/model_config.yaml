# model_config.yaml
# YOLOv8 architecture and training hyperparameters.

model:
  architecture: yolov8n        # n / s / m / l / x
  pretrained_weights: yolov8n.pt
  input_size: [640, 640]
  num_classes: 3

training:
  epochs: 100
  batch_size: 16
  learning_rate: 0.001
  optimizer: AdamW
  early_stopping_patience: 15
  device: cpu                  # cpu | hailo

inference:
  default_target: cpu          # cpu | npu
  paths:
    cpu:
      model_artifact: onnx
      precision: FP32
      runtime: ONNX Runtime
      model_path: models/exported/yolov8n.onnx
      role: baseline
    npu:
      model_artifact: hef      # Hailo Executable Format
      precision: INT8
      runtime: Hailo Runtime
      model_path: models/hailo/yolov8n.hef
      role: accelerated

export:
  cpu_output_dir: models/exported/
  hailo_output_dir: models/hailo/
  cpu_format: onnx
  hailo_format: hef
