<svg width="100%" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">

<style>
  .box { rx:12; stroke-width:1.2; }
  .title { font-size:14px; font-weight:600; fill:#1f2937; text-anchor:middle; }
  .desc { font-size:12px; fill:#4b5563; text-anchor:middle; }
  .arrow { stroke:#6b7280; stroke-width:1.5; fill:none; marker-end:url(#arrow); }
</style>

<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#6b7280"/>
  </marker>
</defs>

<!-- Central System -->
<rect x="330" y="130" width="240" height="100" class="box" fill="#eef2ff" stroke="#4f46e5"/>
<text x="450" y="160" class="title">Edge AI System</text>
<text x="450" y="180" class="desc">Vision + LiDAR Fusion</text>
<text x="450" y="195" class="desc">CPU + Hailo NPU</text>
<text x="450" y="210" class="desc">Resilient Inference</text>

<!-- Latency -->
<rect x="60" y="40" width="170" height="80" class="box" fill="#fef3c7" stroke="#d97706"/>
<text x="145" y="65" class="title">Latency</text>
<text x="145" y="85" class="desc">End-to-End</text>
<text x="145" y="100" class="desc">Mean · P95 · P99</text>

<!-- Throughput -->
<rect x="670" y="40" width="170" height="80" class="box" fill="#ecfdf5" stroke="#059669"/>
<text x="755" y="65" class="title">Throughput</text>
<text x="755" y="85" class="desc">Frames / sec</text>
<text x="755" y="100" class="desc">Real-time rate</text>

<!-- Power -->
<rect x="60" y="250" width="170" height="80" class="box" fill="#fee2e2" stroke="#dc2626"/>
<text x="145" y="275" class="title">Power</text>
<text x="145" y="295" class="desc">USB-C Meter</text>
<text x="145" y="310" class="desc">W · mJ/frame</text>

<!-- Temperature -->
<rect x="670" y="250" width="170" height="80" class="box" fill="#ede9fe" stroke="#7c3aed"/>
<text x="755" y="275" class="title">Temperature</text>
<text x="755" y="295" class="desc">Thermal Zone</text>
<text x="755" y="310" class="desc">°C · Throttling</text>

<!-- Reliability / Confidence -->
<rect x="330" y="10" width="240" height="80" class="box" fill="#ecfeff" stroke="#0891b2"/>
<text x="450" y="35" class="title">Reliability Metrics</text>
<text x="450" y="55" class="desc">Confidence Scores</text>
<text x="450" y="70" class="desc">Sensor Failure Detection</text>

<!-- Arrows -->
<line x1="230" y1="80" x2="330" y2="160" class="arrow"/>
<line x1="670" y1="80" x2="570" y2="160" class="arrow"/>
<line x1="230" y1="290" x2="330" y2="200" class="arrow"/>
<line x1="670" y1="290" x2="570" y2="200" class="arrow"/>
<line x1="450" y1="90" x2="450" y2="130" class="arrow"/>

</svg>